<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#071016">
  <title>Abyss Breaker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <main id="game-shell" aria-label="Abyss Breaker game">
      <header id="hud" aria-label="게임 상태">
        <div class="hud-stat">
          <span>생명</span>
          <strong id="lives-value">3</strong>
        </div>
        <div class="hud-stat">
          <span>점수</span>
          <strong id="score-value">0</strong>
        </div>
        <div class="hud-stat">
          <span>최고</span>
          <strong id="best-score-value">0</strong>
        </div>
        <div class="hud-stat">
          <span>스테이지</span>
          <strong id="stage-value">1</strong>
        </div>
      </header>

      <section id="canvas-wrap" aria-label="전투 영역">
        <canvas id="game-canvas" width="360" height="640">
          이 브라우저는 Canvas를 지원하지 않습니다.
        </canvas>
      </section>

      <footer id="control-bar" aria-label="게임 조작">
        <p id="control-guide">좌우로 움직이고 발사하세요.</p>
        <div class="control-actions">
          <button id="launch-button" type="button">발사</button>
          <button id="pause-button" type="button">일시정지</button>
          <button id="restart-button" type="button">재시작</button>
        </div>
      </footer>

      <section id="start-overlay" class="overlay" aria-label="시작">
        <div class="overlay-panel">
          <p class="overlay-kicker">Abyss Breaker v0.1</p>
          <h1>Abyss Breaker</h1>
          <p class="overlay-copy">패들로 공을 받아 벽돌을 모두 파괴하세요.</p>
          <button id="start-button" type="button">시작</button>
        </div>
      </section>

      <section id="pause-overlay" class="overlay is-hidden" aria-label="일시정지">
        <div class="overlay-panel">
          <p class="overlay-kicker">Paused</p>
          <h2>일시정지</h2>
          <button id="resume-button" type="button">계속</button>
          <button id="pause-restart-button" type="button" class="button-secondary">재시작</button>
        </div>
      </section>

      <section id="life-lost-overlay" class="overlay is-hidden" aria-label="생명 손실">
        <div class="overlay-panel">
          <p class="overlay-kicker">Life Lost</p>
          <h2>공을 놓쳤습니다</h2>
          <p class="overlay-copy">남은 생명이 있으면 공을 다시 배치합니다.</p>
          <button id="continue-button" type="button">계속</button>
        </div>
      </section>

      <section id="stage-clear-overlay" class="overlay is-hidden" aria-label="스테이지 클리어">
        <div class="overlay-panel">
          <p class="overlay-kicker">Stage Clear</p>
          <h2>스테이지 클리어</h2>
          <dl class="result-list">
            <div>
              <dt>점수</dt>
              <dd id="stage-clear-score">0</dd>
            </div>
          </dl>
          <button id="next-stage-button" type="button">다음 스테이지</button>
          <button id="stage-restart-button" type="button" class="button-secondary">이 스테이지 다시</button>
        </div>
      </section>

      <section id="gameover-overlay" class="overlay is-hidden" aria-label="게임오버">
        <div class="overlay-panel">
          <p class="overlay-kicker">Game Over</p>
          <h2>게임오버</h2>
          <dl class="result-list">
            <div>
              <dt>점수</dt>
              <dd id="gameover-score">0</dd>
            </div>
            <div>
              <dt>최고</dt>
              <dd id="gameover-best">0</dd>
            </div>
          </dl>
          <button id="gameover-restart-button" type="button">다시 시작</button>
        </div>
      </section>
    </main>
  </div>

  <script src="data.js"></script>
  <script src="state.js"></script>
  <script src="game.js"></script>
  <script src="render.js"></script>
  <script src="ui.js"></script>
  <script src="main.js"></script>
</body>
</html>
